@if (isMobile()) {
  <app-login-mobile
    [loading]="loading()"
    [requestingPin]="requestingPin()"
    [errorMessage]="errorMessage()"
    [pinMessage]="pinMessage()"
    [currentYear]="currentYear"
    (requestPin)="onRequestPin($event)"
    (loginSubmit)="onLoginSubmit($event)"
  />
} @else {
  <app-login-web
    [loading]="loading()"
    [requestingPin]="requestingPin()"
    [errorMessage]="errorMessage()"
    [pinMessage]="pinMessage()"
    [currentYear]="currentYear"
    [loginBgUrl]="loginBgUrl()"
    [bgLoading]="bgLoading()"
    (requestPin)="onRequestPin($event)"
    (loginSubmit)="onLoginSubmit($event)"
  />
}
