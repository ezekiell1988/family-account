@if (isMobile()) {
  <app-products-mobile
    [products]="products()"
    [skus]="skus()"
    [categories]="categories()"
    [isLoading]="productsLoading()"
    [errorMessage]="productsError() ?? ''"
    [deletingProductId]="deletingProductId()"
    (refresh)="loadAll()"
    (createProduct)="createProduct($event)"
    (editProduct)="updateProduct($event)"
    (removeProduct)="deleteProduct($event)"
    (clearError)="productSvc.clearError()"
  />
} @else {
  <!-- Panel principal: Productos -->
  <app-products-web
    [products]="products()"
    [skus]="skus()"
    [categories]="categories()"
    [isLoading]="productsLoading()"
    [errorMessage]="productsError() ?? ''"
    [deletingId]="deletingProductId()"
    (refresh)="loadAll()"
    (create)="createProduct($event)"
    (editSave)="updateProduct($event)"
    (remove)="deleteProduct($event)"
    (addSku)="addSkuToProduct($event)"
    (removeSku)="removeSkuFromProduct($event)"
    (addCategory)="addCategoryToProduct($event)"
    (removeCategory)="removeCategoryFromProduct($event)"
    (clearError)="clearProductError()"
  />

  <!-- Panel auxiliar: Catálogo de SKUs -->
  <app-products-skus-web
    [skus]="skus()"
    [isLoading]="skusLoading()"
    [errorMessage]="skusError() ?? ''"
    [deletingId]="deletingSkuId()"
    (refresh)="reloadSkus()"
    (create)="createSku($event)"
    (editSave)="updateSku($event)"
    (remove)="deleteSku($event)"
    (clearError)="clearSkuError()"
  />

  <!-- Panel auxiliar: Catálogo de Categorías -->
  <app-products-categories-web
    [categories]="categories()"
    [isLoading]="categoriesLoading()"
    [errorMessage]="categoriesError() ?? ''"
    [deletingId]="deletingCategoryId()"
    (refresh)="reloadCategories()"
    (create)="createCategory($event)"
    (editSave)="updateCategory($event)"
    (remove)="deleteCategory($event)"
    (clearError)="clearCategoryError()"
  />
}
