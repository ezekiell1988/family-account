@if (isMobile()) {
  <app-products-mobile
    [products]="products()"
    [productTypes]="productTypes()"
    [units]="units()"
    [expandedUnits]="expandedProductUnits()"
    [expandedOptionGroups]="expandedProductOptionGroups()"
    [expandedComboSlots]="expandedProductComboSlots()"
    [loadingDetail]="loadingDetail()"
    [isLoading]="productsLoading()"
    [errorMessage]="productsError() ?? ''"
    [deletingProductId]="deletingProductId()"
    (refresh)="loadAll()"
    (createProduct)="createProduct($event)"
    (editProduct)="updateProduct($event)"
    (removeProduct)="deleteProduct($event)"
    (clearError)="productSvc.clearError()"
    (rowExpanded)="loadDetailFor($event)"
  />
} @else {
  <!-- Panel principal: Productos -->
  <app-products-web
    [products]="products()"
    [productTypes]="productTypes()"
    [units]="units()"
    [categories]="categories()"
    [allProducts]="products()"
    [allUnits]="units()"
    [expandedUnits]="expandedProductUnits()"
    [expandedOptionGroups]="expandedProductOptionGroups()"
    [expandedComboSlots]="expandedProductComboSlots()"
    [loadingDetail]="loadingDetail()"
    [isLoading]="productsLoading()"
    [errorMessage]="productsError() ?? ''"
    [deletingId]="deletingProductId()"
    (refresh)="loadAll()"
    (create)="createProduct($event)"
    (editSave)="updateProduct($event)"
    (remove)="deleteProduct($event)"
    (addCategory)="addCategoryToProduct($event)"
    (removeCategory)="removeCategoryFromProduct($event)"
    (clearError)="clearProductError()"
    (rowExpanded)="loadDetailFor($event)"
    (createUnit)="createProductUnit($event)"
    (editUnit)="updateProductUnit($event)"
    (removeUnit)="deleteProductUnit($event)"
    (createOptionGroup)="createOptionGroup($event)"
    (editOptionGroup)="updateOptionGroup($event)"
    (removeOptionGroup)="deleteOptionGroup($event)"
    (createComboSlot)="createComboSlot($event)"
    (editComboSlot)="updateComboSlot($event)"
    (removeComboSlot)="deleteComboSlot($event)"
  />
}
