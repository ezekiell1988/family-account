<!-- Error SKUs -->
@if (errorMessage()) {
  <div class="alert alert-danger d-flex align-items-center mb-3" role="alert">
    <i class="fa fa-exclamation-triangle me-2" aria-hidden="true"></i>
    <span class="flex-grow-1">{{ errorMessage() }}</span>
    <button type="button" class="btn-close ms-2" (click)="clearError.emit()"
      [attr.aria-label]="'Cerrar alerta de error de SKUs'"></button>
  </div>
}

<!-- Formulario SKU -->
@if (showForm()) {
  <div class="alert alert-info mb-3" role="region" aria-label="Formulario de SKU">
    <h6 class="alert-heading">
      <i class="fa fa-barcode me-2" aria-hidden="true"></i>{{ formTitle() }}
    </h6>
    <div class="row g-2">
      <div class="col-sm-4 col-md-3">
        <label for="skuCode" class="form-label fw-semibold">Código <span class="text-danger">*</span></label>
        <input id="skuCode" type="text" class="form-control form-control-sm"
          placeholder="EAN-13, UPC-A…"
          [value]="formCode()"
          (input)="formCode.set($any($event.target).value)"
          maxlength="48"
          [attr.aria-label]="'Código de barras del SKU'">
      </div>
      <div class="col-sm-8 col-md-5">
        <label for="skuName" class="form-label fw-semibold">Nombre <span class="text-danger">*</span></label>
        <input id="skuName" type="text" class="form-control form-control-sm"
          placeholder="Nombre completo en empaque"
          [value]="formName()"
          (input)="formName.set($any($event.target).value)"
          maxlength="200"
          [attr.aria-label]="'Nombre del SKU'">
      </div>
      <div class="col-sm-4 col-md-2">
        <label for="skuBrand" class="form-label fw-semibold">Marca</label>
        <input id="skuBrand" type="text" class="form-control form-control-sm"
          placeholder="Ej: Nestlé"
          [value]="formBrand()"
          (input)="formBrand.set($any($event.target).value)"
          maxlength="100"
          [attr.aria-label]="'Marca del SKU'">
      </div>
      <div class="col-sm-4 col-md-2">
        <label for="skuNetContent" class="form-label fw-semibold">Contenido</label>
        <input id="skuNetContent" type="text" class="form-control form-control-sm"
          placeholder="500ml, 1kg…"
          [value]="formNetContent()"
          (input)="formNetContent.set($any($event.target).value)"
          maxlength="50"
          [attr.aria-label]="'Contenido neto del SKU'">
      </div>
      <div class="col-12">
        <label for="skuDescription" class="form-label fw-semibold">Descripción</label>
        <input id="skuDescription" type="text" class="form-control form-control-sm"
          placeholder="Descripción adicional (opcional)"
          [value]="formDescription()"
          (input)="formDescription.set($any($event.target).value)"
          maxlength="500"
          [attr.aria-label]="'Descripción del SKU'">
      </div>
      <div class="col-12 d-flex gap-2 mt-1">
        <button type="button" class="btn btn-success btn-sm"
          (click)="submitForm()"
          [disabled]="!isFormValid()">
          <i class="fa fa-save me-1" aria-hidden="true"></i>
          {{ isEditing() ? 'Guardar' : 'Crear' }}
        </button>
        <button type="button" class="btn btn-secondary btn-sm"
          (click)="cancelForm()"
          [attr.aria-label]="'Cancelar formulario de SKU'">
          <i class="fa fa-times me-1" aria-hidden="true"></i>Cancelar
        </button>
      </div>
    </div>
  </div>
}

<!-- Confirmación borrado -->
@if (confirmDeleteId() !== null) {
  <div class="alert alert-warning mb-3" role="alert">
    <i class="fa fa-exclamation-circle me-2" aria-hidden="true"></i>
    ¿Eliminar este SKU? Esta acción no se puede deshacer.
    <div class="mt-2">
      <button type="button" class="btn btn-danger btn-sm me-2" (click)="confirmDelete()">
        <i class="fa fa-trash me-1" aria-hidden="true"></i>Eliminar
      </button>
      <button type="button" class="btn btn-secondary btn-sm" (click)="cancelDelete()">Cancelar</button>
    </div>
  </div>
}

<panel title="Catálogo de SKUs (Códigos de barras)"
  variant="default"
  [showReloadButton]="true"
  [reload]="isLoading()"
  (onReload)="refresh.emit()">

  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <div class="input-group input-group-sm" style="max-width:260px">
      <span class="input-group-text"><i class="fa fa-search" aria-hidden="true"></i></span>
      <input type="text" class="form-control" placeholder="Buscar SKU…"
        [value]="filterSearch()"
        (input)="filterSearch.set($any($event.target).value)"
        aria-label="Buscar SKU">
    </div>
    <button type="button" class="btn btn-success btn-sm ms-auto"
      (click)="openCreate()"
      [attr.aria-label]="'Nuevo SKU'">
      <i class="fa fa-plus me-1" aria-hidden="true"></i>Nuevo SKU
    </button>
  </div>

  <ngx-datatable
    class="bootstrap"
    [rows]="filteredSkus()"
    [columnMode]="ColumnMode.force"
    [headerHeight]="40"
    [footerHeight]="50"
    [rowHeight]="'auto'"
    [limit]="15"
    [loadingIndicator]="isLoading()">

    <ngx-datatable-column name="Código" prop="codeProductSKU" [width]="140" [sortable]="true">
      <ng-template let-value="value" ngx-datatable-cell-template>
        <code class="small">{{ value }}</code>
      </ng-template>
    </ngx-datatable-column>

    <ngx-datatable-column name="Nombre" prop="nameProductSKU" [sortable]="true">
      <ng-template let-value="value" ngx-datatable-cell-template>
        {{ value }}
      </ng-template>
    </ngx-datatable-column>

    <ngx-datatable-column name="Marca" prop="brandProductSKU" [width]="120" [sortable]="true">
      <ng-template let-value="value" ngx-datatable-cell-template>
        @if (value) { <span class="badge bg-light text-dark border">{{ value }}</span> }
        @else { <span class="text-muted">—</span> }
      </ng-template>
    </ngx-datatable-column>

    <ngx-datatable-column name="Contenido" prop="netContent" [width]="100" [sortable]="false">
      <ng-template let-value="value" ngx-datatable-cell-template>
        @if (value) { <span class="text-info small">{{ value }}</span> }
        @else { <span class="text-muted">—</span> }
      </ng-template>
    </ngx-datatable-column>

    <ngx-datatable-column name="Acciones" [width]="110" [sortable]="false">
      <ng-template let-row="row" ngx-datatable-cell-template>
        <div class="d-flex gap-1">
          <button type="button" class="btn btn-xs btn-primary"
            (click)="openEdit(row)"
            [disabled]="showForm() || deletingId() === row.idProductSKU"
            [attr.aria-label]="'Editar SKU ' + row.codeProductSKU"
            [attr.title]="'Editar SKU ' + row.codeProductSKU">
            <i class="fa fa-pencil" aria-hidden="true"></i>
            <span class="visually-hidden">Editar {{ row.codeProductSKU }}</span>
          </button>
          <button type="button" class="btn btn-xs btn-danger"
            (click)="askDelete(row.idProductSKU)"
            [disabled]="showForm() || deletingId() === row.idProductSKU"
            [attr.aria-label]="'Eliminar SKU ' + row.codeProductSKU"
            [attr.title]="'Eliminar SKU ' + row.codeProductSKU">
            @if (deletingId() === row.idProductSKU) {
              <i class="fa fa-spinner fa-spin" aria-hidden="true"></i>
            } @else {
              <i class="fa fa-trash" aria-hidden="true"></i>
            }
            <span class="visually-hidden">Eliminar {{ row.codeProductSKU }}</span>
          </button>
        </div>
      </ng-template>
    </ngx-datatable-column>

  </ngx-datatable>
</panel>
