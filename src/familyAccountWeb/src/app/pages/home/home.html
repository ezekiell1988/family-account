@if (isMobile()) {
  <app-home-mobile
    [currentUser]="currentUser()"
    [rolesLabel]="rolesLabel()"
    [nameCompany]="appSettings.nameCompany"
    (logoutRequested)="logout()"
  />
} @else {
  <app-home-web
    [currentUser]="currentUser()"
    [rolesLabel]="rolesLabel()"
    [nameCompany]="appSettings.nameCompany"
    (logoutRequested)="logout()"
  />
}
