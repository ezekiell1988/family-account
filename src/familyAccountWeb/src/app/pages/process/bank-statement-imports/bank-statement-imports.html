@if (isMobile()) {
  <app-bank-statement-imports-mobile
    [isLoading]="isLoading()"
    [isUploading]="isUploading()"
    [isBulkClassifying]="isBulkClassifying()"
    [errorMessage]="error() ?? ''"
    [imports]="imports()"
    [transactions]="visibleTransactions()"
    [templates]="templates()"
    [bankAccounts]="bankAccounts()"
    [movementTypes]="movementTypes()"
    [accounts]="chartAccounts()"
    [costCenters]="costCenters()"
    [selectedImportId]="selectedImportId()"
    [pendingCount]="pendingCount()"
    [isLoadingCatalogs]="isLoadingCatalogs()"
    [showOnlyPending]="showOnlyPending()"
    (refresh)="load()"
    (upload)="uploadFile($event)"
    (expand)="expandImport($event)"
    (expandPending)="expandPendingImport($event)"
    (batchClassify)="classifyBatch($event)"
    (clearError)="error.set(null)"
  />
} @else {
  <app-bank-statement-imports-web
    [isLoading]="isLoading()"
    [isUploading]="isUploading()"
    [isBulkClassifying]="isBulkClassifying()"
    [errorMessage]="error() ?? ''"
    [imports]="imports()"
    [transactions]="visibleTransactions()"
    [templates]="templates()"
    [bankAccounts]="bankAccounts()"
    [movementTypes]="movementTypes()"
    [accounts]="chartAccounts()"
    [costCenters]="costCenters()"
    [selectedImportId]="selectedImportId()"
    [pendingCount]="pendingCount()"
    [isLoadingCatalogs]="isLoadingCatalogs()"
    [showOnlyPending]="showOnlyPending()"
    (refresh)="load()"
    (upload)="uploadFile($event)"
    (expand)="expandImport($event)"
    (expandPending)="expandPendingImport($event)"
    (batchClassify)="classifyBatch($event)"
    (clearError)="error.set(null)"
  />
}
