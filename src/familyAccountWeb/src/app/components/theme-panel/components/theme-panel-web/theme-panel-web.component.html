<div class="theme-panel" [ngClass]="{ 'active': active }">
	<button type="button" (click)="toggleThemePanel()" class="theme-collapse-btn">
		<i class="fa fa-cog" aria-hidden="true"></i>
		<span class="visually-hidden">{{ 'THEME.APP_CONFIG' | translate }}</span>
	</button>
	<ng-scrollbar class="h-100">
		<div class="theme-panel-content">
			<h5>{{ 'THEME.APP_CONFIG' | translate }}</h5>

			<!-- BEGIN theme-list -->
			<div class="theme-list">
				@for (theme of themes; track $index) {
				<div class="theme-list-item" [ngClass]="{'active': selectedTheme === theme}">
					<a href="javascript:;" class="theme-list-link" [ngClass]="'active bg-' + theme"
						(click)="toggleTheme(theme)"
						[attr.data-bs-title]="((theme === 'teal') ? 'Default' : theme.charAt(0).toUpperCase() + theme.slice(1))"
						data-bs-toggle="tooltip" data-bs-trigger="hover" data-bs-container="body">
						<span class="visually-hidden">{{ (theme === 'teal') ? 'Default' : theme }}</span>
					</a>
				</div>
				}
			</div>
			<!-- END theme-list -->

			<div class="theme-panel-divider"></div>

			<div class="row mt-10px">
				<div class="col-8 control-label text-dark fw-bold">
					<div class="d-flex">{{ 'THEME.DARK_MODE' | translate }} <span
							class="badge bg-theme ms-1 py-2px position-relative d-flex align-items-center">{{ 'THEME.DARK_MODE_NEW' | translate }}</span>
					</div>
					<div class="lh-14">
						<small class="text-dark opacity-50">
							{{ 'THEME.DARK_MODE_LONG_DESC' | translate }}
						</small>
					</div>
				</div>
				<div class="col-4 d-flex">
					<div class="form-check form-switch ms-auto mb-0">
						<input type="checkbox" class="form-check-input" name="app-theme-dark-mode" id="appThemeDarkMode"
							(change)="toggleDarkMode($event)" [checked]="appThemeDarkModeCheckbox" value="1" />
						<label class="form-check-label" for="appThemeDarkMode">
							<span class="visually-hidden">{{ 'THEME.DARK_MODE' | translate }}</span>
						</label>
					</div>
				</div>
			</div>

			<!-- <div class="theme-panel-divider"></div> -->

			<!-- BEGIN theme-switch -->
			<!-- (comentado - opciones adicionales) -->
			<!-- END theme-switch -->

			<div class="theme-panel-divider"></div>

			<!-- BEGIN btn-row -->
			<button type="button" class="btn btn-default d-block w-100 rounded-pill"
				(click)="resetLocalStorage()"><b>{{ 'THEME.RESET' | translate }}</b></button>
			<!-- END btn-row -->
		</div>
	</ng-scrollbar>
</div>
