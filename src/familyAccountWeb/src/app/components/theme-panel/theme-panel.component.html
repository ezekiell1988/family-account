@if (isMobile()) {
  <theme-panel-mobile
    (appDarkModeChanged)="appDarkModeChanged.emit($event)"
    (appThemeChanged)="appThemeChanged.emit($event)" />
} @else {
  <theme-panel-web
    (appDarkModeChanged)="appDarkModeChanged.emit($event)"
    (appThemeChanged)="appThemeChanged.emit($event)" />
}
